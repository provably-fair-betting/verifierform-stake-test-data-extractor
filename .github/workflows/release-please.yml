on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Generate version badge
        if: ${{ steps.release.outputs.release_created }}
        run: |
          mkdir -p badges
          VERSION=$(jq -r '.version' package.json)
          VERSION_MSG=$(echo "$VERSION" | sed 's/-/%E2%80%93/g')
          curl -sf "https://img.shields.io/badge/version-v${VERSION_MSG}-blue.svg" -o badges/version.svg

      - name: Commit badge
        if: ${{ steps.release.outputs.release_created }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update version badge [skip ci]'
          file_pattern: badges/version.svg
